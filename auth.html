<!-- THIS FILE IS auth.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Tavikmart</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body{display:flex;flex-direction:column;min-height:100vh}
    .auth-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,113,227,0.07) 0%,transparent 70%)}
    .auth-box{width:100%;max-width:440px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:44px 40px}
    .auth-logo{display:flex;align-items:center;justify-content:center;margin-bottom:32px}
    .auth-logo img{height:48px;object-fit:contain}
    .auth-tabs{display:flex;background:var(--bg4);border-radius:10px;padding:4px;margin-bottom:28px}
    .auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--text2);transition:all var(--transition);border:none;background:none;font-family:var(--font-body)}
    .auth-tab.active{background:var(--bg);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .auth-form{display:none}
    .auth-form.active{display:block}
    .auth-submit{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;font-weight:700;cursor:pointer;transition:all var(--transition);margin-top:8px;box-shadow:0 0 20px var(--accent-glow)}
    .auth-submit:hover{background:var(--accent2);transform:translateY(-1px)}
    .auth-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .auth-divider{text-align:center;font-size:12px;color:var(--text2);margin:20px 0;position:relative}
    .auth-divider::before{content:'';position:absolute;left:0;top:50%;width:42%;height:1px;background:var(--border)}
    .auth-divider::after{content:'';position:absolute;right:0;top:50%;width:42%;height:1px;background:var(--border)}
    .google-btn{width:100%;padding:12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all var(--transition)}
    .google-btn:hover{border-color:var(--accent);background:var(--bg3)}
    .auth-error{background:rgba(224,49,49,.1);border:1px solid rgba(224,49,49,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#ff6b6b;margin-bottom:16px;display:none}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;padding:4px}
  </style>
</head>
<body>
<header class="navbar">
  <div class="nav-top">
    <a href="index.html" class="logo-wrap"><img src="assets/logo.png" alt="Tavikmart" class="logo-img"/></a>
    <div class="nav-actions">
      <a href="cart.html" class="nav-btn cart-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cartCount">0</span></a>
    </div>
  </div>
</header>

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo"><img src="assets/logo.png" alt="Tavikmart"/></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
    </div>
    <div id="authError" class="auth-error"></div>

    <div class="auth-form active" id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"/></div>
      <div class="form-group"><label>Password</label>
        <div class="pw-wrap"><input type="password" id="loginPw" placeholder="Enter password"/><button class="toggle-pw" onclick="togglePw('loginPw')" type="button">👁</button></div>
      </div>
      <button class="auth-submit" onclick="doLogin()" id="loginBtn">Sign In</button>
      <div class="auth-divider">or</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-form" id="registerForm">
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"/></div>
      <div class="form-group"><label>Password</label>
        <div class="pw-wrap"><input type="password" id="regPw" placeholder="Min 6 characters"/><button class="toggle-pw" onclick="togglePw('regPw')" type="button">👁</button></div>
      </div>
      <button class="auth-submit" onclick="doRegister()" id="regBtn">Create Account</button>
      <div class="auth-divider">or</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script>
  const redirect = new URLSearchParams(window.location.search).get('redirect') || '';
  auth.onAuthStateChanged(user => { if (user) window.location.href = redirect === 'checkout' ? 'checkout.html' : 'index.html'; });

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginForm').classList.toggle('active',tab==='login');
    document.getElementById('registerForm').classList.toggle('active',tab==='register');
    clearError();
  }
  function showError(msg){const e=document.getElementById('authError');e.textContent=msg;e.style.display='block';}
  function clearError(){const e=document.getElementById('authError');e.style.display='none';}
  function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}

  async function doLogin(){
    clearError();
    const email=document.getElementById('loginEmail').value.trim();
    const pw=document.getElementById('loginPw').value;
    if(!email||!pw){showError('Please fill in all fields');return;}
    const btn=document.getElementById('loginBtn');
    btn.disabled=true;btn.textContent='Signing in...';
    try{await auth.signInWithEmailAndPassword(email,pw);}
    catch(err){showError(friendlyError(err.code));btn.disabled=false;btn.textContent='Sign In';}
  }

  async function doRegister(){
    clearError();
    const name=document.getElementById('regName').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const pw=document.getElementById('regPw').value;
    if(!name||!email||!pw){showError('Please fill in all fields');return;}
    if(pw.length<6){showError('Password must be at least 6 characters');return;}
    const btn=document.getElementById('regBtn');
    btn.disabled=true;btn.textContent='Creating account...';
    try{
      const cred=await auth.createUserWithEmailAndPassword(email,pw);
      await cred.user.updateProfile({displayName:name});
      await db.collection('users').doc(cred.user.uid).set({name,email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(err){showError(friendlyError(err.code));btn.disabled=false;btn.textContent='Create Account';}
  }

  async function doGoogle(){
    clearError();
    try{
      const result=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
      await db.collection('users').doc(result.user.uid).set({name:result.user.displayName,email:result.user.email,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    }catch(err){showError(friendlyError(err.code));}
  }

  function friendlyError(code){
    return({'auth/user-not-found':'No account found with this email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'This email is already registered.','auth/invalid-email':'Please enter a valid email.','auth/weak-password':'Password is too weak.','auth/too-many-requests':'Too many attempts. Try again later.','auth/popup-closed-by-user':'Sign-in cancelled.'})[code]||'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
