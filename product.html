<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Tavikmart</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .product-detail{display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:60px 80px;max-width:1200px;margin:0 auto}
    .product-gallery{position:sticky;top:100px;height:fit-content}
    .main-image{width:100%;aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden}
    .main-image img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
    .thumb-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .thumb{width:68px;height:68px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color var(--transition);flex-shrink:0}
    .thumb:hover,.thumb.active{border-color:var(--accent)}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .product-detail-info{padding-top:10px}
    .detail-category{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:10px}
    .detail-name{font-family:var(--font-display);font-size:42px;line-height:1;letter-spacing:1px;margin-bottom:18px}
    .detail-price-row{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
    .detail-price{font-size:30px;font-weight:700}
    .detail-old-price{font-size:18px;color:var(--text2);text-decoration:line-through}
    .detail-discount{background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
    .detail-flash{background:var(--orange);color:#000;font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
    .detail-desc{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:28px}
    .qty-row{display:flex;align-items:center;gap:16px;margin-bottom:22px}
    .qty-row label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
    .qty-control{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
    .qty-control button{background:none;border:none;color:var(--text);font-size:18px;width:40px;height:40px;cursor:pointer;transition:background var(--transition)}
    .qty-control button:hover{background:var(--bg4)}
    .qty-control span{min-width:40px;text-align:center;font-size:15px;font-weight:600}
    .detail-actions{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
    .detail-actions .btn{flex:1;min-width:140px;padding:14px}
    .detail-meta{border-top:1px solid var(--border);padding-top:20px;display:flex;flex-direction:column;gap:8px}
    .meta-row{display:flex;gap:12px;font-size:13px}
    .meta-row span:first-child{color:var(--text2);min-width:100px}
    .related-section{padding:60px 80px;border-top:1px solid var(--border)}
    @media(max-width:900px){.product-detail{grid-template-columns:1fr;padding:28px 20px;gap:28px}.product-gallery{position:static}.detail-name{font-size:34px}.related-section{padding:40px 20px}}
  </style>
</head>
<body>
<header class="navbar">
  <div class="nav-top">
    <a href="index.html" class="logo-wrap"><img src="assets/logo.png" alt="Tavikmart" class="logo-img"/></a>
    <div class="search-bar"><input type="text" placeholder="Search products..." id="searchInput"/><button class="search-btn" onclick="handleSearch()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button></div>
    <div class="nav-actions">
      <a href="auth.html" class="nav-btn" id="authBtn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="authLabel">Sign In</span></a>
      <a href="cart.html" class="nav-btn cart-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cartCount">0</span></a>
      <a href="dashboard.html" class="nav-btn" id="adminBtn" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
    </div>
  </div>
</header>

<!-- Skeleton shown instantly -->
<div id="productDetailWrap">
  <div class="product-detail">
    <div class="product-gallery"><div class="skeleton" style="width:100%;aspect-ratio:1;border-radius:20px"></div></div>
    <div style="padding-top:10px">
      <div class="skeleton" style="height:12px;width:30%;margin-bottom:16px"></div>
      <div class="skeleton" style="height:48px;width:80%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:48px;width:60%;margin-bottom:24px"></div>
      <div class="skeleton" style="height:32px;width:40%;margin-bottom:20px"></div>
      <div class="skeleton" style="height:14px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:14px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:14px;width:70%;margin-bottom:32px"></div>
    </div>
  </div>
</div>

<section class="related-section" id="relatedSection" style="display:none">
  <div class="section-header"><h2 class="section-title">Related Products</h2></div>
  <div class="products-grid" id="relatedProducts"></div>
</section>

<footer class="footer" style="margin-top:40px">
  <div class="footer-top">
    <div class="footer-brand"><img src="assets/logo.png" alt="Tavikmart" class="footer-logo"/><p>Your one-stop marketplace delivered across Nigeria.</p></div>
    <div class="footer-links"><h4>Shop</h4><a href="shop.html">All Products</a></div>
    <div class="footer-links"><h4>Account</h4><a href="account.html">My Account</a><a href="cart.html">Cart</a></div>
    <div class="footer-links"><h4>Info</h4><a href="about.html">About</a><a href="contact.html">Contact</a><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></div>
  </div>
  <div class="footer-bottom"><p>© 2025 Tavikmart. Built by <span class="accent">DEVGODSWILL</span>.</p></div>
</footer>

<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let currentProduct = null, qty = 1;

  async function loadProduct() {
    if (!productId) { window.location.href = 'shop.html'; return; }
    try {
      const doc = await db.collection('products').doc(productId).get();
      if (!doc.exists) { window.location.href = 'shop.html'; return; }
      currentProduct = { id: doc.id, ...doc.data() };
      renderProduct(currentProduct);
      loadRelated(currentProduct.category, productId);
    } catch(err) {
      document.getElementById('productDetailWrap').innerHTML = `<div class="empty-state" style="padding:80px"><h3>Error loading product</h3><p>${err.message}</p></div>`;
    }
  }

  function renderProduct(p) {
    document.title = `${p.name} — Tavikmart`;
    const isFlash = p.flashSale && p.flashPrice;
    const displayPrice = isFlash ? p.flashPrice : p.price;
    const originalPrice = isFlash ? p.price : p.oldPrice;
    const discount = originalPrice ? Math.round((1 - displayPrice / originalPrice) * 100) : null;
    const images = p.images?.length ? p.images : (p.image ? [p.image] : []);
    const inWl = Wishlist.has(p.id);

    document.getElementById('productDetailWrap').innerHTML = `
      <div class="product-detail">
        <div class="product-gallery">
          <div class="main-image"><img src="${images[0] || 'assets/placeholder.svg'}" alt="${p.name}" id="mainImg" onerror="this.src='assets/placeholder.svg'"/></div>
          ${images.length > 1 ? `<div class="thumb-row">${images.map((img,i) => `<div class="thumb ${i===0?'active':''}" onclick="switchImg('${img}',this)"><img src="${img}" onerror="this.src='assets/placeholder.svg'"/></div>`).join('')}</div>` : ''}
        </div>
        <div class="product-detail-info">
          <p class="detail-category">${p.category || 'General'}</p>
          <h1 class="detail-name">${p.name}</h1>
          <div class="detail-price-row">
            <span class="detail-price">${formatPrice(displayPrice)}</span>
            ${originalPrice ? `<span class="detail-old-price">${formatPrice(originalPrice)}</span>` : ''}
            ${isFlash ? `<span class="detail-flash">⚡ FLASH SALE</span>` : discount ? `<span class="detail-discount">-${discount}%</span>` : ''}
          </div>
          <p class="detail-desc">${p.description || 'No description available.'}</p>
          <div class="qty-row">
            <label>Quantity</label>
            <div class="qty-control">
              <button onclick="changeQty(-1)">−</button>
              <span id="qtyDisplay">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-primary" onclick="addToCartNow()">🛒 Add to Cart</button>
            <button class="btn btn-outline" onclick="buyNow()">Buy Now →</button>
            <button class="btn btn-outline ${inWl?'active':''}" onclick="toggleWl(this)" style="${inWl?'border-color:#ff4d6d;color:#ff4d6d':''}">${inWl?'❤️ Saved':'🤍 Wishlist'}</button>
          </div>
          <div class="detail-meta">
            <div class="meta-row"><span>Category</span><span>${p.category||'—'}</span></div>
            <div class="meta-row"><span>Availability</span><span style="color:var(--green)">${p.inStock!==false?'✓ In Stock':'✗ Out of Stock'}</span></div>
            ${p.brand?`<div class="meta-row"><span>Brand</span><span>${p.brand}</span></div>`:''}
            ${isFlash?`<div class="meta-row"><span>Sale</span><span style="color:var(--orange)">⚡ Flash Sale Active</span></div>`:''}
          </div>
        </div>
      </div>`;
  }

  function switchImg(src, el) {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qtyDisplay').textContent = qty;
  }

  function addToCartNow() {
    if (!currentProduct) return;
    const price = currentProduct.flashSale && currentProduct.flashPrice ? currentProduct.flashPrice : currentProduct.price;
    for (let i = 0; i < qty; i++) {
      Cart.add({ id: currentProduct.id, name: currentProduct.name, price, image: currentProduct.image || (currentProduct.images?.[0] || ''), category: currentProduct.category || '' });
    }
  }

  function buyNow() { addToCartNow(); window.location.href = 'cart.html'; }

  function toggleWl(btn) {
    if (!currentProduct) return;
    Wishlist.toggle({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, image: currentProduct.image || '', category: currentProduct.category || '' }, null);
    const inWl = Wishlist.has(currentProduct.id);
    btn.textContent = inWl ? '❤️ Saved' : '🤍 Wishlist';
    btn.style.borderColor = inWl ? '#ff4d6d' : '';
    btn.style.color = inWl ? '#ff4d6d' : '';
  }

  async function loadRelated(category, excludeId) {
    const section = document.getElementById('relatedSection');
    const container = document.getElementById('relatedProducts');
    try {
      const snap = await db.collection('products').where('category', '==', category).limit(5).get();
      const items = snap.docs.filter(d => d.id !== excludeId).slice(0, 4);
      if (items.length === 0) return;
      section.style.display = 'block';
      container.innerHTML = items.map(d => renderProductCard({ id: d.id, ...d.data() })).join('');
      observeImages(container);
    } catch {}
  }

  loadProduct();
</script>
</body>
</html>
