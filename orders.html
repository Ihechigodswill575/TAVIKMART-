<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Tavikmart</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .orders-wrap { max-width: 900px; margin: 0 auto; padding: 40px; }
    .success-banner { background: rgba(0,212,100,0.08); border: 1px solid rgba(0,212,100,0.2); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 32px; display: flex; gap: 14px; align-items: flex-start; }
    .success-icon { font-size: 28px; flex-shrink: 0; }
    .success-banner h3 { font-size: 16px; font-weight: 700; color: #00d464; margin-bottom: 4px; }
    .success-banner p { font-size: 13px; color: var(--text2); }
    .order-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
    .order-card-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
    .order-ref { font-size: 11px; font-family: monospace; color: var(--text2); }
    .order-date { font-size: 12px; color: var(--text2); }
    .order-status { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: rgba(0,212,255,0.1); color: var(--accent2); }
    .order-items-list { padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
    .order-line { display: flex; gap: 14px; align-items: center; }
    .order-line-img { width: 50px; height: 50px; background: var(--bg4); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .order-line-img img { width: 100%; height: 100%; object-fit: cover; }
    .order-line-name { flex: 1; font-size: 14px; }
    .order-line-qty { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .order-line-price { font-size: 14px; font-weight: 700; }
    .order-card-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .order-total { font-size: 16px; font-weight: 700; }
    .order-addr { font-size: 12px; color: var(--text2); max-width: 300px; text-align: right; }
  </style>
</head>
<body>
<header class="navbar">
  <div class="nav-top">
    <a href="index.html" class="logo-wrap"><img src="assets/logo.png" alt="Tavikmart" class="logo-img"/><span class="logo-text">Tavikmart</span></a>
    <div class="nav-actions">
      <a href="shop.html" class="nav-btn">Shop</a>
      <a href="cart.html" class="nav-btn cart-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cartCount">0</span></a>
      <a href="dashboard.html" class="nav-btn" id="adminBtn" style="display:none"><span>Dashboard</span></a>
      <button class="nav-btn" onclick="auth.signOut().then(()=>window.location.href='index.html')" style="background:none;border:none;cursor:pointer;font-family:var(--font-body);color:var(--text2);font-size:13px">Sign Out</button>
    </div>
  </div>
</header>

<div class="orders-wrap">
  <div class="page-header" style="padding:0 0 30px"><h1>My Orders</h1><p>Track all your Tavikmart purchases</p></div>
  <div id="successBanner" style="display:none"></div>
  <div id="ordersContainer">
    <div class="loading-spinner"><div class="spinner"></div><p>Loading your orders...</p></div>
  </div>
</div>

<footer class="footer" style="margin-top:40px">
  <div class="footer-bottom"><p>© 2025 Tavikmart. Built by <span class="accent">DEVGODSWILL</span>.</p></div>
</footer>

<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const isSuccess = params.get('success') === 'true';
  const ref = params.get('ref') || '';

  if (isSuccess) {
    document.getElementById('successBanner').style.display = 'flex';
    document.getElementById('successBanner').innerHTML = `
      <div class="success-banner">
        <div class="success-icon">✅</div>
        <div>
          <h3>Payment Successful!</h3>
          <p>Your order has been placed. Reference: <strong>${ref}</strong></p>
        </div>
      </div>`;
  }

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    loadOrders(user.uid);
  });

  async function loadOrders(uid) {
    const container = document.getElementById('ordersContainer');
    try {
      const snap = await db.collection('orders')
        .where('userId', '==', uid)
        .orderBy('createdAt', 'desc')
        .get();

      if (snap.empty) {
        container.innerHTML = `
          <div class="empty-state" style="padding:80px;text-align:center">
            <div style="font-size:56px;margin-bottom:16px">📦</div>
            <h3>No orders yet</h3>
            <p style="margin-bottom:24px">You haven't placed any orders yet.</p>
            <a href="shop.html" class="btn btn-primary">Start Shopping</a>
          </div>`;
        return;
      }

      container.innerHTML = snap.docs.map(doc => {
        const o = doc.data();
        const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }) : '—';
        return `
          <div class="order-card">
            <div class="order-card-header">
              <div>
                <p style="font-size:13px;font-weight:600;margin-bottom:3px">Order #${doc.id.slice(0,8).toUpperCase()}</p>
                <p class="order-ref">${o.paystackRef || '—'}</p>
              </div>
              <p class="order-date">${date}</p>
              <span class="order-status">${(o.status || 'paid').toUpperCase()}</span>
            </div>
            <div class="order-items-list">
              ${(o.items || []).map(item => `
                <div class="order-line">
                  <div class="order-line-img"><img src="${item.image || 'assets/placeholder.png'}" onerror="this.src='assets/placeholder.png'"/></div>
                  <div style="flex:1">
                    <p class="order-line-name">${item.name}</p>
                    <p class="order-line-qty">Qty: ${item.qty}</p>
                  </div>
                  <p class="order-line-price">₦${Number(item.price * item.qty).toLocaleString()}</p>
                </div>
              `).join('')}
            </div>
            <div class="order-card-footer">
              <p class="order-total">Total: ₦${Number(o.total).toLocaleString()}</p>
              <p class="order-addr">${o.address || '—'}</p>
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      container.innerHTML = `<div class="empty-state" style="padding:60px"><h3>Error loading orders</h3><p>${err.message}</p></div>`;
    }
  }
</script>
</body>
</html>
