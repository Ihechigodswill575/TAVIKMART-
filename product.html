<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Tavikmart</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    .product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 60px 80px; max-width: 1200px; margin: 0 auto; }
    .product-gallery { position: sticky; top: 100px; height: fit-content; }
    .main-image { width: 100%; aspect-ratio: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    .main-image img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-row { display: flex; gap: 10px; margin-top: 14px; }
    .thumb { width: 70px; height: 70px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color var(--transition); flex-shrink: 0; }
    .thumb:hover, .thumb.active { border-color: var(--accent); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .product-detail-info { padding-top: 10px; }
    .detail-category { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); margin-bottom: 12px; }
    .detail-name { font-family: var(--font-display); font-size: 44px; line-height: 1; letter-spacing: 1px; margin-bottom: 20px; }
    .detail-price-row { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
    .detail-price { font-size: 32px; font-weight: 700; }
    .detail-old-price { font-size: 18px; color: var(--text2); text-decoration: line-through; }
    .detail-discount { background: #e03131; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
    .detail-desc { font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 32px; }
    .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .qty-row label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
    .qty-control { display: flex; align-items: center; gap: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .qty-control button { background: none; border: none; color: var(--text); font-size: 18px; width: 40px; height: 40px; cursor: pointer; transition: background var(--transition); }
    .qty-control button:hover { background: var(--bg4); }
    .qty-control span { min-width: 40px; text-align: center; font-size: 15px; font-weight: 600; }
    .detail-actions { display: flex; gap: 12px; margin-bottom: 36px; }
    .detail-actions .btn { flex: 1; padding: 16px; font-size: 15px; }
    .detail-meta { border-top: 1px solid var(--border); padding-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .meta-row { display: flex; gap: 12px; font-size: 13px; }
    .meta-row span:first-child { color: var(--text2); min-width: 100px; }
    .related-section { padding: 60px 80px; border-top: 1px solid var(--border); }
    @media (max-width: 900px) { .product-detail { grid-template-columns: 1fr; padding: 30px 20px; gap: 30px; } .product-gallery { position: static; } .detail-name { font-size: 34px; } .related-section { padding: 40px 20px; } }
  </style>
</head>
<body>

<header class="navbar">
  <div class="nav-top">
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo.png" alt="Tavikmart" class="logo-img"/>
      <span class="logo-text">Tavikmart</span>
    </a>
    <div class="search-bar">
      <input type="text" placeholder="Search products..." id="searchInput"/>
      <button class="search-btn" onclick="handleSearch()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <div class="nav-actions">
      <a href="auth.html" class="nav-btn" id="authBtn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span id="authLabel">Sign In</span></a>
      <a href="cart.html" class="nav-btn cart-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count" id="cartCount">0</span></a>
      <a href="dashboard.html" class="nav-btn" id="adminBtn" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
    </div>
  </div>
</header>

<div id="productDetailWrap">
  <div class="loading-spinner" style="padding:100px;display:flex;flex-direction:column;align-items:center;gap:16px">
    <div class="spinner"></div><p>Loading product...</p>
  </div>
</div>

<section class="related-section">
  <div class="section-header"><h2 class="section-title">Related Products</h2></div>
  <div class="products-grid" id="relatedProducts"></div>
</section>

<footer class="footer">
  <div class="footer-bottom"><p>© 2025 Tavikmart. Built by <span class="accent">DEVGODSWILL</span>.</p></div>
</footer>

<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('id');
  let currentProduct = null;
  let qty = 1;

  async function loadProduct() {
    if (!productId) { window.location.href = 'shop.html'; return; }
    try {
      const doc = await db.collection('products').doc(productId).get();
      if (!doc.exists) { window.location.href = 'shop.html'; return; }
      currentProduct = { id: doc.id, ...doc.data() };
      renderProduct(currentProduct);
      loadRelated(currentProduct.category, productId);
    } catch (err) {
      document.getElementById('productDetailWrap').innerHTML =
        `<div class="empty-state" style="padding:80px"><h3>Error loading product</h3><p>${err.message}</p></div>`;
    }
  }

  function renderProduct(p) {
    document.title = `${p.name} — Tavikmart`;
    const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : null;
    const images = p.images || (p.image ? [p.image] : []);

    document.getElementById('productDetailWrap').innerHTML = `
      <div class="product-detail">
        <div class="product-gallery">
          <div class="main-image">
            <img src="${images[0] || 'assets/placeholder.png'}" alt="${p.name}" id="mainImg" onerror="this.src='assets/placeholder.png'"/>
          </div>
          ${images.length > 1 ? `
          <div class="thumb-row">
            ${images.map((img, i) => `
              <div class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImg('${img}', this)">
                <img src="${img}" onerror="this.src='assets/placeholder.png'"/>
              </div>
            `).join('')}
          </div>` : ''}
        </div>

        <div class="product-detail-info">
          <p class="detail-category">${p.category || 'General'}</p>
          <h1 class="detail-name">${p.name}</h1>
          <div class="detail-price-row">
            <span class="detail-price">${formatPrice(p.price)}</span>
            ${p.oldPrice ? `<span class="detail-old-price">${formatPrice(p.oldPrice)}</span>` : ''}
            ${discount ? `<span class="detail-discount">-${discount}%</span>` : ''}
          </div>
          <p class="detail-desc">${p.description || 'No description available.'}</p>

          <div class="qty-row">
            <label>Quantity</label>
            <div class="qty-control">
              <button onclick="changeQty(-1)">−</button>
              <span id="qtyDisplay">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>

          <div class="detail-actions">
            <button class="btn btn-primary" onclick="addToCartNow()">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              Add to Cart
            </button>
            <button class="btn btn-outline" onclick="buyNow()">Buy Now</button>
          </div>

          <div class="detail-meta">
            <div class="meta-row"><span>Category</span><span>${p.category || '—'}</span></div>
            <div class="meta-row"><span>Availability</span><span style="color:#00d4ff">${p.inStock !== false ? '✓ In Stock' : '✗ Out of Stock'}</span></div>
            ${p.brand ? `<div class="meta-row"><span>Brand</span><span>${p.brand}</span></div>` : ''}
            ${p.sku ? `<div class="meta-row"><span>SKU</span><span>${p.sku}</span></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function switchImg(src, el) {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qtyDisplay').textContent = qty;
  }

  function addToCartNow() {
    for (let i = 0; i < qty; i++) {
      Cart.add({
        id: currentProduct.id,
        name: currentProduct.name,
        price: currentProduct.price,
        image: currentProduct.image || (currentProduct.images && currentProduct.images[0]) || '',
        category: currentProduct.category || ''
      });
    }
  }

  function buyNow() {
    addToCartNow();
    window.location.href = 'cart.html';
  }

  async function loadRelated(category, excludeId) {
    const container = document.getElementById('relatedProducts');
    try {
      const snap = await db.collection('products')
        .where('category', '==', category)
        .limit(5)
        .get();
      const items = snap.docs.filter(d => d.id !== excludeId).slice(0, 4);
      if (items.length === 0) { container.parentElement.style.display = 'none'; return; }
      container.innerHTML = items.map(d => renderProductCard({ id: d.id, ...d.data() })).join('');
    } catch { container.parentElement.style.display = 'none'; }
  }

  loadProduct();
</script>
</body>
</html>
